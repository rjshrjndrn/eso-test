apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openreplay-namespaces
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/rjshrjndrn/eso-test.git
    targetRevision: main
    path: instances/openreplay-prod/resources/namespaces
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
